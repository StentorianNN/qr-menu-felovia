<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Felovia Gurme — Menü</title>
<meta name="theme-color" content="#343c17" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Karla:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --olive-deep: #343c17;   /* page background */
    --olive: #4b5626;        /* panels, matches the print menu */
    --cream: #f2eedd;        /* primary text */
    --cream-soft: #c9c8ad;   /* secondary text */
    --gold: #cfa75e;         /* accent: prices, active states */
    --line: #64703a;         /* hairlines on olive */
    --display: "Cormorant Garamond", Georgia, serif;
    --body: "Karla", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }

  body {
    background: var(--olive-deep);
    color: var(--cream);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Header with logo ---------- */
  header {
    text-align: center;
    padding: 2.5rem 1.25rem 1.75rem;
    background:
      radial-gradient(ellipse at top, rgba(207,167,94,0.12), transparent 60%),
      var(--olive-deep);
  }
  header .logo {
    width: 132px;
    height: 132px;
    border-radius: 50%;
    box-shadow: 0 6px 24px rgba(0,0,0,0.35);
  }
  header h1 {
    font-family: var(--display);
    font-weight: 600;
    font-size: clamp(2rem, 8vw, 2.8rem);
    letter-spacing: 0.02em;
    margin-top: 1rem;
  }
  header .tagline {
    margin-top: 0.35rem;
    color: var(--cream-soft);
    font-size: 0.85rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  header .rule {
    width: 64px;
    height: 1px;
    background: var(--gold);
    margin: 1.1rem auto 0;
  }

  /* ---------- Sticky category nav ---------- */
  nav {
    position: sticky;
    top: 0;
    z-index: 10;
    background: color-mix(in srgb, var(--olive-deep) 90%, transparent);
    backdrop-filter: blur(8px);
    border-block: 1px solid var(--line);
    display: flex;
    gap: 0.25rem;
    overflow-x: auto;
    padding: 0.6rem 1rem;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  nav a {
    flex: 0 0 auto;
    text-decoration: none;
    color: var(--cream-soft);
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.45rem 0.9rem;
    border-radius: 999px;
    transition: color 0.15s, background 0.15s;
  }
  nav a.active, nav a:hover {
    color: var(--olive-deep);
    background: var(--gold);
  }
  nav a:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  /* ---------- Menu sections ---------- */
  main { max-width: 640px; margin: 0 auto; padding: 0 1.25rem 4rem; }
  section { padding-top: 2.5rem; scroll-margin-top: 4rem; }
  section h2 {
    font-family: var(--display);
    font-weight: 600;
    font-size: 1.7rem;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 0.85rem;
  }
  section h2::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }
  section .cat-note {
    margin-top: 0.4rem;
    color: var(--gold);
    font-size: 0.8rem;
    letter-spacing: 0.05em;
  }

  .item {
    padding: 1.05rem 0;
    display: flex;
    gap: 0.9rem;
    align-items: center;
  }
  .item + .item { border-top: 1px dashed var(--line); }
  .item .thumb {
    flex: 0 0 auto;
    width: 96px;
    height: 96px;
    border-radius: 12px;
    object-fit: cover;
    background: var(--olive);
    border: 1px solid var(--line);
  }
  .item .content { flex: 1; min-width: 0; }
  .item .row { display: flex; align-items: baseline; gap: 0.5rem; }
  .item .name { font-weight: 700; font-size: 1rem; letter-spacing: 0.01em; }
  .item .leader {
    flex: 1;
    border-bottom: 2px dotted var(--line);
    transform: translateY(-4px);
  }
  .item .price {
    font-family: var(--display);
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--gold);
    white-space: nowrap;
  }
  .item .desc {
    margin-top: 0.3rem;
    color: var(--cream-soft);
    font-size: 0.87rem;
    line-height: 1.45;
    max-width: 52ch;
  }

  footer {
    text-align: center;
    color: var(--cream-soft);
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    padding: 2rem 1rem 3rem;
    border-top: 1px solid var(--line);
  }
  footer .mark {
    font-family: var(--display);
    font-size: 1.1rem;
    color: var(--cream);
    margin-bottom: 0.3rem;
  }

  .status { text-align: center; color: var(--cream-soft); padding: 3rem 1rem; }
</style>
</head>
<body>
  <header>
    <img class="logo" id="logo" src="/images/logo.png" alt="Felovia Gurme logo" />
    <h1 id="restaurant-name">Felovia Gurme</h1>
    <p class="tagline" id="restaurant-tagline"></p>
    <div class="rule"></div>
  </header>

  <nav id="category-nav" aria-label="Menü kategorileri"></nav>

  <main id="menu">
    <p class="status">Menü yükleniyor…</p>
  </main>

  <footer>
    <div class="mark">Felovia Gurme</div>
    Fiyatlara KDV dahildir · Alerjenler için personelimize danışabilirsiniz
  </footer>

<script>
  window.__FALLBACK__ = {"restaurant": "Felovia Gurme", "tagline": "Gurme Sandviçler · Tostlar · Kahve", "logo": "/images/logo.png", "currency": "₺", "categories": [{"name": "Gurme Sandviçler", "note": "Ekmek seçenekleri: Focaccia, Baget, Ciabatta", "items": [{"name": "Dana Kaburga Füme", "price": 560, "image": "/images/dana-kaburga-fume.jpg", "desc": "Dana kaburga füme, dil peyniri, marul, domates, trüflü sıvı tuz, mascarpone peyniri, pesto sos"}, {"name": "Dana Jambon", "price": 495, "image": "/images/dana-jambon.jpg", "desc": "Dana jambon, dil peyniri, marul, domates, trüflü sıvı tuz, mascarpone peyniri, pesto sos"}, {"name": "Hindi Füme", "price": 465, "image": "/images/hindi-fume.jpg", "desc": "Hindi füme, dil peyniri, marul, domates, trüflü sıvı tuz, mascarpone peyniri, pesto sos"}, {"name": "Üç Peynir", "price": 425, "desc": "Kars taze kaşar, dil peyniri, marul, domates, trüflü sıvı tuz, mascarpone peyniri, pesto sos"}, {"name": "Feloviç Kaburga Füme", "price": 660, "desc": "Dana kaburga füme, mozzarella peyniri, roka, domates, zeytinyağı, domatesli fesleğenli tuzlu çeşni, kekikli sıvı tuz, pesto rosso sos"}, {"name": "Feloviç Dana Jambon", "price": 595, "desc": "Dana jambon, mozzarella peyniri, roka, domates, zeytinyağı, domatesli fesleğenli tuzlu çeşni, kekikli sıvı tuz, pesto rosso sos"}, {"name": "Feloviç Hindi Füme", "price": 565, "desc": "Hindi füme, mozzarella peyniri, roka, domates, zeytinyağı, domatesli fesleğenli tuzlu çeşni, kekikli sıvı tuz, pesto rosso sos"}, {"name": "Feloviç Mozzarella", "price": 525, "desc": "Mozzarella peyniri, roka, domates, zeytinyağı, domatesli fesleğenli tuzlu çeşni, kekikli sıvı tuz, pesto rosso sos"}, {"name": "Tiftiko Dil Peyniri", "price": 890, "desc": "Tiftik et (120 gr), dil peyniri, roka, domates, Kars tereyağı, domatesli fesleğenli tuzlu çeşni, mascarpone, trüflü sıvı tuz, pesto sos"}, {"name": "Tiftiko Mozzarella", "price": 990, "desc": "Tiftik et (120 gr), mozzarella peyniri, roka, domates, Kars tereyağı, domatesli fesleğenli tuzlu çeşni, mascarpone, trüflü sıvı tuz, pesto sos"}, {"name": "Tiftiko Burrata", "price": 1140, "desc": "Tiftik et (120 gr), burrata peyniri, roka, domates, Kars tereyağı, domatesli fesleğenli tuzlu çeşni, balzamik glaze, mascarpone, kekikli sıvı tuz, pesto sos"}, {"name": "Napoli Kaburga Füme", "price": 860, "desc": "Burrata peyniri, dana kaburga füme, roka, domates, zeytinyağı, domatesli fesleğenli tuzlu çeşni, balzamik glaze, mascarpone, kekikli sıvı tuz, pesto sos"}, {"name": "Napoli Dana Jambon", "price": 795, "desc": "Burrata peyniri, dana jambon, roka, domates, zeytinyağı, domatesli fesleğenli tuzlu çeşni, balzamik glaze, mascarpone, kekikli sıvı tuz, pesto sos"}, {"name": "Napoli Hindi Füme", "price": 765, "desc": "Burrata peyniri, hindi füme, roka, domates, zeytinyağı, domatesli fesleğenli tuzlu çeşni, kekikli sıvı tuz, pesto sos"}, {"name": "Napoli Burrata", "price": 725, "desc": "Burrata peyniri, roka, domates, zeytinyağı, domatesli fesleğenli tuzlu çeşni, balzamik glaze, mascarpone, kekikli sıvı tuz, pesto sos"}]}, {"name": "Gurme Tostlar", "note": "Ekmek seçenekleri: Bazlama, Baget, Ciabatta", "items": [{"name": "Karışık Tost", "price": 425, "desc": "Dana sucuk, Kars taze kaşarı, lütenitsa sos"}, {"name": "Kaşarlı Tost", "price": 360, "desc": "Kars taze kaşarı, lütenitsa sos"}, {"name": "Pestolu Kaşarlı Tost", "price": 360, "desc": "Kars taze kaşarı, pesto sos"}, {"name": "Hindi Fümeli Tost", "price": 390, "desc": "Hindi füme, Kars taze kaşarı, lütenitsa sos"}, {"name": "Kaburga Fümeli Tost", "price": 525, "desc": "Kaburga füme, Kars taze kaşarı, mascarpone, lütenitsa sos"}, {"name": "Gusto Tost", "price": 690, "desc": "Dana sucuk, dana jambon, Kars taze kaşarı, turşu, domates, acı biber salçası, lütenitsa sos"}, {"name": "Bello Tost", "price": 485, "desc": "Dana sucuk, Kars taze kaşarı, mascarpone, acı biber salçası"}, {"name": "Şefin Tostu", "price": 640, "desc": "İki kat dana sucuk, domates, kornişon turşu, lütenitsa sos, acı biber salçası (ciabatta ya da baget)"}]}, {"name": "Soğuk İçecekler", "note": "Sıkma meyve suları · Şeker ilavesizdir · 250 ml", "items": [{"name": "Portakal Suyu", "price": 150, "image": "/images/juice-portakal.jpg"}, {"name": "Nar & Portakal Suyu", "price": 150, "image": "/images/juice-nar-portakal.jpg"}, {"name": "Vişne Suyu", "price": 150, "image": "/images/juice-visne.jpg"}, {"name": "Nar Suyu", "price": 150, "image": "/images/juice-nar.jpg"}, {"name": "Karadut Suyu", "price": 150, "image": "/images/juice-karadut.jpg"}, {"name": "Kara Üzüm Suyu", "price": 150, "image": "/images/juice-kara-uzum.jpg"}, {"name": "Şeftali Suyu", "price": 150, "image": "/images/juice-seftali.jpg"}, {"name": "Kayısı Suyu", "price": 150, "image": "/images/juice-kayisi.jpg"}, {"name": "Böğürtlen Suyu", "price": 150, "image": "/images/juice-bogurtlen.jpg"}, {"name": "Elma Suyu", "price": 150, "image": "/images/juice-elma.jpg"}, {"name": "Orman Perisi Suyu", "price": 150, "image": "/images/juice-orman-perisi.jpg"}, {"name": "Erik Suyu", "price": 150, "image": "/images/juice-erik.jpg"}, {"name": "Ahududu Suyu", "price": 150, "image": "/images/juice-ahududu.jpg"}, {"name": "Coca Cola", "price": 120, "image": "/images/drink-cola.jpg"}, {"name": "Coca Cola Zero", "price": 120, "image": "/images/drink-cola-zero.jpg"}, {"name": "Özerhisar Ayran", "price": 120, "image": "/images/drink-ayran.jpg"}, {"name": "Arslan Ayran", "price": 120, "image": "/images/drink-ayran-arslan.jpg"}, {"name": "Soda", "price": 90, "image": "/images/drink-soda.jpg"}, {"name": "Su", "price": 50, "image": "/images/drink-su.jpg"}]}, {"name": "Sıcak İçecekler", "items": [{"name": "Macchiato", "price": 210}, {"name": "Cappuccino", "price": 220}, {"name": "Latte", "price": 210, "image": "/images/coffee-latte.jpg"}, {"name": "Filtre Kahve", "price": 190, "image": "/images/coffee-filtre.jpg"}, {"name": "Espresso", "price": 120}, {"name": "Americano", "price": 190, "image": "/images/coffee-americano.jpg"}, {"name": "Türk Kahvesi", "price": 150}, {"name": "Çay", "price": 60, "image": "/images/coffee-cay.jpg"}, {"name": "Fincan Çay", "price": 90, "image": "/images/coffee-fincan-cay.jpg"}]}, {"name": "Soğuk Kahveler", "items": [{"name": "Ice Latte", "price": 220, "image": "/images/coffee-ice-latte.jpg"}, {"name": "Ice Cappuccino", "price": 230}, {"name": "Ice Americano", "price": 200}]}]};

  const slug = (s) => s.toLowerCase()
    .replaceAll("ı","i").replaceAll("ş","s").replaceAll("ğ","g")
    .replaceAll("ü","u").replaceAll("ö","o").replaceAll("ç","c")
    .replace(/[^a-z0-9]+/g, "-");

  function render(data) {
    document.getElementById("restaurant-name").textContent = data.restaurant;
    document.getElementById("restaurant-tagline").textContent = data.tagline || "";
    document.title = data.restaurant + " — Menü";
    if (data.logo) document.getElementById("logo").src = data.logo;
    const cur = data.currency || "₺";

    const nav = document.getElementById("category-nav");
    const main = document.getElementById("menu");
    nav.innerHTML = "";
    main.innerHTML = "";

    for (const cat of data.categories) {
      const id = slug(cat.name);

      const link = document.createElement("a");
      link.href = "#" + id;
      link.textContent = cat.name;
      link.dataset.target = id;
      nav.appendChild(link);

      const section = document.createElement("section");
      section.id = id;
      const h2 = document.createElement("h2");
      h2.textContent = cat.name;
      section.appendChild(h2);
      if (cat.note) {
        const note = document.createElement("p");
        note.className = "cat-note";
        note.textContent = cat.note;
        section.appendChild(note);
      }

      for (const item of cat.items) {
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML =
          '<div class="content">' +
            '<div class="row">' +
              '<span class="name"></span>' +
              '<span class="leader"></span>' +
              '<span class="price"></span>' +
            "</div>" +
          "</div>";
        div.querySelector(".name").textContent = item.name;
        div.querySelector(".price").textContent = item.price + cur;
        if (item.desc) {
          const p = document.createElement("p");
          p.className = "desc";
          p.textContent = item.desc;
          div.querySelector(".content").appendChild(p);
        }
        if (item.image) {
          const img = document.createElement("img");
          img.className = "thumb";
          img.src = item.image;
          img.alt = item.name;
          img.loading = "lazy";
          img.onerror = () => img.remove();
          div.prepend(img);
        }
        section.appendChild(div);
      }
      main.appendChild(section);
    }

    const links = [...nav.querySelectorAll("a")];
    const observer = new IntersectionObserver(
      (entries) => {
        for (const entry of entries) {
          if (entry.isIntersecting) {
            links.forEach((l) =>
              l.classList.toggle("active", l.dataset.target === entry.target.id)
            );
          }
        }
      },
      { rootMargin: "-35% 0px -60% 0px" }
    );
    main.querySelectorAll("section").forEach((s) => observer.observe(s));
  }

  async function load() {
    try {
      const res = await fetch("/api/menu");
      if (!res.ok) throw new Error("HTTP " + res.status);
      render(await res.json());
    } catch {
      render(window.__FALLBACK__ || { restaurant: "Felovia Gurme", categories: [] });
    }
  }
  load();
</script>
</body>
</html>
